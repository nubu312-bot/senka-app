<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦果カウンター</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  margin: 10px;
}

/* 数値 */
#value {
  font-size: 80px;
  margin: 20px;
  font-weight: bold;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* ボタン */
.btn {
  font-size: 32px;
  padding: 50px 0;
  border-radius: 20px;
  border: none;
  color: white;
  width: 100%;
  position: relative;
}

/* 回数（ボタン内） */
.count {
  position: absolute;
  bottom: 10px;
  right: 15px;
  font-size: 28px;
  font-weight: bold;
}

/* 色 */
.btn1 { background: #4CAF50; }
.btn2 { background: #2196F3; }
.btn3 { background: #FF9800; }
.btn4 { background: #F44336; }

/* リセット */
.reset {
  background: black;
  margin-top: 20px;
  width: 95%;
  padding: 30px;
  font-size: 30px;
}
</style>
</head>

<body>

<h2>今日の目標戦果</h2>
<input type="number" id="target" style="font-size:24px;">
<button onclick="setTarget()">設定</button>

<h3>残り戦果</h3>
<div id="value">0</div>

<div class="grid">

  <button class="btn btn1" onclick="clickBtn('a',1)">
    1-5<br>-1
    <div class="count" id="count-a">0</div>
  </button>

  <button class="btn btn2" onclick="clickBtn('b',1.5)">
    7-1<br>-1.5
    <div class="count" id="count-b">0</div>
  </button>

  <button class="btn btn3" onclick="clickBtn('c',2)">
    4-4<br>-2
    <div class="count" id="count-c">0</div>
  </button>

  <button class="btn btn4" onclick="clickBtn('d',2)">
    6-3<br>-2
    <div class="count" id="count-d">0</div>
  </button>

</div>

<button class="reset" onclick="resetAll()">リセット</button>

<script>
let remaining = 0;
let target = 0;

let counts = { a:0, b:0, c:0, d:0 };

/* ロード */
window.onload = function() {
  let data = localStorage.getItem("senka");
  if (data) {
    data = JSON.parse(data);
    remaining = data.remaining;
    target = data.target;
    counts = data.counts;

    document.getElementById("target").value = target;
    updateCounts();
    update();
  }
};

/* 保存 */
function save() {
  localStorage.setItem("senka", JSON.stringify({
    remaining, target, counts
  }));
}

/* 目標 */
function setTarget() {
  target = Number(document.getElementById("target").value);
  remaining = target;
  save();
  update();
}

/* ボタン */
function clickBtn(type, value) {
  remaining -= value;
  if (remaining < 0) remaining = 0;

  counts[type]++;
  updateCounts();
  save();
  update();
}

/* 回数更新 */
function updateCounts() {
  document.getElementById("count-a").innerText = counts.a;
  document.getElementById("count-b").innerText = counts.b;
  document.getElementById("count-c").innerText = counts.c;
  document.getElementById("count-d").innerText = counts.d;
}

/* リセット */
function resetAll() {
  remaining = 0;
  target = 0;
  counts = { a:0, b:0, c:0, d:0 };

  localStorage.removeItem("senka");
  updateCounts();
  update();
}

/* 表示 */
function update() {
  document.getElementById("value").innerText = remaining.toFixed(1);

  let color = "green";
  if (remaining <= target * 0.5) color = "orange";
  if (remaining <= target * 0.2) color = "red";

  document.getElementById("value").style.color = color;
}
</script>

</body>
</html>
