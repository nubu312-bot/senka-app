<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦果カウンター</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

#top {
  padding: 10px;
}

#value {
  font-size: 70px;
  margin: 10px;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  height: 65vh;
}

/* ボタン */
.btn {
  font-size: 32px;
  border-radius: 15px;
  border: none;
  color: white;
  width: 100%;
  height: 100%;
  position: relative;

  transition: transform 0.1s, filter 0.1s;
}

/* 押したとき */
.btn:active {
  transform: scale(0.9);       /* 縮む */
  filter: brightness(0.7);     /* 暗くなる */
}

/* 回数 */
.count {
  position: absolute;
  bottom: 10px;
  right: 15px;
  font-size: 30px;
  font-weight: bold;
}

/* 色 */
.btn1 { background: #4CAF50; }
.btn2 { background: #2196F3; }
.btn3 { background: #FF9800; }
.btn4 { background: #F44336; }

.reset {
  background: black;
  width: 100%;
  height: 10vh;
  font-size: 30px;
  border: none;
  color: white;
}
</style>
</head>

<body>

<div id="top">
  <h3>目標戦果</h3>
  <input type="number" id="target" value="60" style="font-size:22px;">
  <button onclick="setTarget()">設定</button>

  <h3>残り戦果</h3>
  <div id="value">60</div>
</div>

<div class="grid">

  <button class="btn btn1" onclick="clickBtn('a',1)">
    1-5<br>-1
    <div class="count" id="count-a">0</div>
  </button>

  <button class="btn btn2" onclick="clickBtn('b',1.5)">
    7-1<br>-1.5
    <div class="count" id="count-b">0</div>
  </button>

  <button class="btn btn3" onclick="clickBtn('c',2)">
    4-4<br>-2
    <div class="count" id="count-c">0</div>
  </button>

  <button class="btn btn4" onclick="clickBtn('d',2)">
    6-3<br>-2
    <div class="count" id="count-d">0</div>
  </button>

</div>

<button class="reset" onclick="resetAll()">リセット</button>

<script>
let target = 60;
let remaining = 60;
let counts = { a:0, b:0, c:0, d:0 };

window.onload = function() {
  let data = localStorage.getItem("senka");
  if (data) {
    data = JSON.parse(data);
    target = data.target;
    remaining = data.remaining;
    counts = data.counts;
  }

  document.getElementById("target").value = target;
  updateCounts();
  update();
};

function save() {
  localStorage.setItem("senka", JSON.stringify({
    target, remaining, counts
  }));
}

function setTarget() {
  target = Number(document.getElementById("target").value);
  remaining = target;
  save();
  update();
}

function clickBtn(type, value) {
  remaining -= value;

  counts[type]++;
  updateCounts();

  /* 振動（スマホ） */
  if (navigator.vibrate) {
    navigator.vibrate(30);
  }

  save();
  update();
}

function updateCounts() {
  document.getElementById("count-a").innerText = counts.a;
  document.getElementById("count-b").innerText = counts.b;
  document.getElementById("count-c").innerText = counts.c;
  document.getElementById("count-d").innerText = counts.d;
}

function resetAll() {
  target = 60;
  remaining = 60;
  counts = { a:0, b:0, c:0, d:0 };

  localStorage.removeItem("senka");

  updateCounts();
  update();
}

function update() {
  document.getElementById("value").innerText = remaining.toFixed(1);

  let color = "green";
  if (remaining <= 0) color = "red";
  else if (remaining <= target * 0.5) color = "orange";

  document.getElementById("value").style.color = color;
}
</script>

</body>
</html>
